<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#161616"/>
      <stop offset="1" stop-color="#0b0a08"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#e8d3a0"/>
      <stop offset="0.5" stop-color="#c9a96e"/>
      <stop offset="1" stop-color="#a7854a"/>
    </linearGradient>
  </defs>

  <!-- rounded-square background -->
  <rect x="0" y="0" width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- fretboard: a vertical neck slab -->
  <rect x="196" y="72" width="120" height="368" rx="14" fill="#1e1a14" stroke="#3a3226" stroke-width="3"/>

  <!-- frets (horizontal lines), spacing shrinks going up = the reach theme -->
  <g stroke="#5a4e38" stroke-width="5" stroke-linecap="round">
    <line x1="196" y1="140" x2="316" y2="140"/>
    <line x1="196" y1="210" x2="316" y2="210"/>
    <line x1="196" y1="272" x2="316" y2="272"/>
    <line x1="196" y1="326" x2="316" y2="326"/>
    <line x1="196" y1="372" x2="316" y2="372"/>
  </g>

  <!-- 6 strings (vertical) -->
  <g stroke="#4a4436" stroke-width="2.5">
    <line x1="212" y1="72" x2="212" y2="440"/>
    <line x1="232" y1="72" x2="232" y2="440"/>
    <line x1="252" y1="72" x2="252" y2="440"/>
    <line x1="260" y1="72" x2="260" y2="440"/>
    <line x1="280" y1="72" x2="280" y2="440"/>
    <line x1="300" y1="72" x2="300" y2="440"/>
  </g>

  <!-- finger-reach dots: a wide chord shape in gold, the app's core idea -->
  <g fill="url(#gold)">
    <circle cx="222" cy="175" r="20"/>
    <circle cx="256" cy="241" r="20"/>
    <circle cx="290" cy="299" r="20"/>
  </g>
  <!-- reach span arc connecting them -->
  <path d="M222 175 Q 300 240 290 299" fill="none" stroke="url(#gold)" stroke-width="7" stroke-linecap="round" opacity="0.55"/>
</svg>
