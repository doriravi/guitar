# SQLite file-based database (persists across restarts)
spring.datasource.url=jdbc:sqlite:${DB_PATH:./data/guitarreach-dev.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT
app.jwt.secret=${JWT_SECRET:devSecretKeyThatIsAtLeast256BitsLongForHmacSha256Algorithm123}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# Stripe (set real values via environment variables)
stripe.api.key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
stripe.price.monthly=${STRIPE_PRICE_ID_MONTHLY:price_placeholder}

# CORS — handled via CorsConfig pattern matching (*.up.railway.app, *.vercel.app, localhost)
app.frontend.url=http://localhost:5174

server.port=${PORT:8080}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Mail (dev: set these to a real SMTP or leave to disable email sending)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
