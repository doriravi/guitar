spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# SQLite
spring.datasource.url=jdbc:sqlite:${DB_PATH:/app/data/guitarreach.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT
app.jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# Cookies
app.cookie.secure=${COOKIE_SECURE:false}

# Stripe
stripe.api.key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
stripe.price.monthly=${STRIPE_PRICE_ID_MONTHLY:price_placeholder}

app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Gemini
gemini.api.key=${GEMINI_API_KEY:}

# OAuth (social sign-in). Blank by default -> endpoints return 503 and the UI
# disables the corresponding button. Set these to activate Google/Facebook login.
oauth.google.client-id=${GOOGLE_CLIENT_ID:}
oauth.facebook.app-id=${FACEBOOK_APP_ID:}
oauth.facebook.app-secret=${FACEBOOK_APP_SECRET:}

server.port=${PORT:8080}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.mail.enabled=false

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:placeholder@gmail.com}
spring.mail.password=${MAIL_PASSWORD:placeholder}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.test-connection=false
# Fail fast instead of hanging when the SMTP host is unreachable (e.g. on
# Railway). Email is sent async, but these caps bound the worst case.
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
