spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# SQLite
spring.datasource.url=jdbc:sqlite:${DB_PATH:/app/data/guitarreach.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT
app.jwt.secret=${JWT_SECRET:dev-secret-key-change-in-production}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# Cookies. For a cross-site frontend/backend split (different domains) set
# COOKIE_SAME_SITE=None and COOKIE_SECURE=true so the JWT cookies are sent on
# cross-site requests. Same-site / local dev uses Lax.
app.cookie.secure=${COOKIE_SECURE:false}
app.cookie.same-site=${COOKIE_SAME_SITE:Lax}

# Stripe
stripe.api.key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
stripe.price.monthly=${STRIPE_PRICE_ID_MONTHLY:price_placeholder}

app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# Gemini (hand-photo analysis)
gemini.api.key=${GEMINI_API_KEY:}

# Anthropic / Claude (powers the guide avatar's AI explanations). Blank -> the
# /api/explain endpoint returns 503 and the guide falls back to local heuristics.
anthropic.api.key=${ANTHROPIC_API_KEY:}

# Audio -> Tab transcription sidecar (tab-service/, wraps fingerstyle-tab-mcp).
# Blank -> /api/tab/transcribe returns 503 (graceful degradation). The dev profile
# defaults this to the local service; prod relies on the TAB_SERVICE_URL env var.
tab.service.url=${TAB_SERVICE_URL:}

# Audio uploads are larger than Spring's 1MB multipart default.
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

# OAuth (social sign-in). Blank by default -> endpoints return 503 and the UI
# disables the corresponding button. Set these to activate Google/Facebook login.
oauth.google.client-id=${GOOGLE_CLIENT_ID:}
oauth.facebook.app-id=${FACEBOOK_APP_ID:}
oauth.facebook.app-secret=${FACEBOOK_APP_SECRET:}

server.port=${PORT:8080}

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
management.health.mail.enabled=false

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:placeholder@gmail.com}
spring.mail.password=${MAIL_PASSWORD:placeholder}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.test-connection=false
# Fail fast instead of hanging when the SMTP host is unreachable (e.g. on
# Railway). Email is sent async, but these caps bound the worst case.
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
