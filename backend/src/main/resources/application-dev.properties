# SQLite file-based database (persists across restarts)
spring.datasource.url=jdbc:sqlite:${DB_PATH:./data/guitarreach-dev.db}
spring.datasource.driver-class-name=org.sqlite.JDBC

spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT
app.jwt.secret=${JWT_SECRET:devSecretKeyThatIsAtLeast256BitsLongForHmacSha256Algorithm123}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# Stripe (set real values via environment variables)
stripe.api.key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
stripe.price.monthly=${STRIPE_PRICE_ID_MONTHLY:price_placeholder}

# CORS — frontend origins
app.frontend.url=http://localhost:5173
app.frontend.url.extra=https://perfect-compassion-production-fa2c.up.railway.app

server.port=${PORT:8080}
