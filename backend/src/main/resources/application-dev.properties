# H2 file-based database (persists across restarts)
spring.datasource.url=jdbc:h2:file:./data/guitarreach-dev;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 console (dev only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JWT
app.jwt.secret=${JWT_SECRET:devSecretKeyThatIsAtLeast256BitsLongForHmacSha256Algorithm123}
app.jwt.access-token-expiry-ms=900000
app.jwt.refresh-token-expiry-ms=604800000

# Stripe (set real values via environment variables)
stripe.api.key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}
stripe.price.monthly=${STRIPE_PRICE_ID_MONTHLY:price_placeholder}

# CORS — frontend origin
app.frontend.url=http://localhost:5173

server.port=8080
